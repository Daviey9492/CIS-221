<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Details - Trendy Fashion Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Trendy Fashion Hub</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="index.html#products">Shop</a>
    <a href="index.html#sales">Sales</a>
    <a href="index.html#benefits">Why Shop With Us?</a>
  </nav>
</header>

<main>
  <div id="product-details-container" class="product-detail-container">
    <div class="product-image">
      <img id="product-image" src="" alt="Fashion Product">
    </div>
    <div class="product-info">
      <h2 id="product-title">Loading Product...</h2>
      <p id="product-id">Item ID: ---</p>
      <p class="price-large" id="product-price">KSh ---</p>
      <p><strong>Sizes:</strong> S, M, L, XL</p>
      <p id="product-color">Color: ---</p>
      <div class="description-box">
        <h4>Description</h4>
        <p id="product-description">Fetching details...</p>
      </div>
      <button class="add-to-cart-btn" onclick="addToCart()">Add to Cart</button>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2025 Trendy Fashion Hub, CIS 221. All rights reserved.</p>
</footer>

<script>
// --- product list (short descriptions to look handwritten) ---
const productData = {
 '101': {name:'Crimson Red Evening Gown', price:'KSh 5,500', color:'Crimson Red', image:'placeholder_dress_1.jpg', description:'Full-length gown, silky fabric. Good for weddings and formal nights.'},
 '102': {name:'Flowy Floral Summer Maxi', price:'KSh 3,500', color:'Floral Print', image:'placeholder_dress_2.jpg', description:'Light cotton maxi, comfy straps. Great for sunny days.'},
 '103': {name:'Little Black Dress', price:'KSh 2,700', color:'Black', image:'placeholder_dress_3.jpg', description:'Simple A-line black dress. Classic and flexible wear.'},
 '104': {name:'Sequin Cocktail Dress', price:'KSh 4,300', color:'Silver', image:'placeholder_dress_4.jpg', description:'Cocktail dress covered in sequins. Party ready.'},

 '201': {name:'Classic Trench Coat', price:'KSh 5,800', color:'Beige', image:'placeholder_coat_1.jpg', description:'Water-resistant trench coat. Double-breasted, belt style.'},
 '202': {name:'Denim Jacket', price:'KSh 2,000', color:'Blue Denim', image:'placeholder_jacket_1.jpg', description:'Casual denim jacket. Faded look.'},
 '203': {name:'Plaid Wool Blazer', price:'KSh 5,600', color:'Grey/Red Plaid', image:'placeholder_blazer_1.jpg', description:'Wool blazer with plaid pattern. Smart or casual use.'},

 '301': {name:'Leather Tote Bag', price:'KSh 2,500', color:'Brown', image:'placeholder_bag_1.jpg', description:'Large leather tote. Gold details, durable.'},
 '302': {name:'Silk Scarf', price:'KSh 1,500', color:'Multi Print', image:'placeholder_scarf_1.jpg', description:'Light silk scarf with print. Soft feel.'},
 '303': {name:'Layered Gold Necklace', price:'KSh 4,000', color:'Gold Plated', image:'placeholder_necklace_1.jpg', description:'Thin chains layered necklace. Everyday look.'},
 '304': {name:'Leather Belt', price:'KSh 4,500', color:'Black', image:'placeholder_belt_1.jpg', description:'Black belt with silver buckle. Simple and neat.'},

 '401': {name:'Stiletto Heels', price:'KSh 3,000', color:'Black Suede', image:'placeholder_shoe_1.jpg', description:'Pointed stiletto heels, 4-inch lift.'},
 '402': {name:'Urban Sneakers', price:'KSh 2,300', color:'White', image:'placeholder_shoe_2.jpg', description:'Low-top canvas sneakers, comfy for daily wear.'}
};

// helper: set text
function setText(id, text){
 let el=document.getElementById(id);
 if(el) el.textContent=text;
}

// helper: set image
function setImg(id, src, alt){
 let img=document.getElementById(id);
 if(img){img.src=src; img.alt=alt;}
}

// load product on page ready
document.addEventListener('DOMContentLoaded', function(){
 let params=new URLSearchParams(window.location.search);
 let pid=params.get('id');
 if(pid && productData[pid]){
   let p=productData[pid];
   document.title=p.name+" - Details";
   setText('product-title', p.name);
   setText('product-id', "Item ID: "+pid);
   setText('product-price', p.price);
   setText('product-color', "Color: "+p.color);
   setText('product-description', p.description);
   setImg('product-image', p.image, p.name);
 } else {
   document.title="Product Not Found";
   setText('product-title',"Product Not Found");
   let container=document.getElementById('product-details-container');
   if(container){
     container.innerHTML="<p style='text-align:center; margin:50px;'>Sorry, no product found. <a href='index.html#products'>Back to shop</a></p>";
   }
 }
});

// add to cart button
function addToCart(){
 let title=document.getElementById('product-title').textContent;
 if(title && title!=="Loading Product..." && title!=="Product Not Found"){
   alert(title+" added to your cart!");
 } else {
   alert("Nothing to add.");
 }
}
</script>

</body>
</html>
